name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotfile-build:
    name: Dotfiles
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Check Brewfile contents
        run: brew bundle list
      - name: Setup zsh
        run: brew install zsh
      - name: Run generate script
        run: zsh generate_aliases.zsh
      - name: Run deploy script
        run: zsh copy_configs.zsh
